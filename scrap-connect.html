<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScrapConnect — Directory</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #06080d;
            --bg2: #0c0f18;
            --card: #0f1320;
            --border: rgba(255, 255, 255, .07);
            --green: #00e676;
            --red: #ff3d57;
            --gold: #ffd740;
            --blue: #448aff;
            --text: #e8ecf5;
            --muted: #5a6275;
            --white: #fff;
            --sidebar-w: 240px
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, .025) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 0
        }

        .sidebar-logo {
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem
        }

        .sidebar-logo .brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: var(--gold)
        }

        .sidebar-logo .brand span {
            color: var(--green)
        }

        .sidebar-logo .role-tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: .62rem;
            color: var(--muted);
            letter-spacing: 1px;
            margin-top: .2rem
        }

        .nav-section {
            padding: .4rem 1rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: .6rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: .5rem
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .7rem 1.5rem;
            font-size: .85rem;
            color: var(--muted);
            cursor: pointer;
            transition: all .2s;
            border-left: 3px solid transparent;
            text-decoration: none
        }

        .nav-item:hover {
            color: var(--text);
            background: rgba(255, 255, 255, .03)
        }

        .nav-item.active {
            color: var(--green);
            background: rgba(0, 230, 118, .06);
            border-left-color: var(--green)
        }

        .nav-item .icon {
            font-size: 1rem;
            width: 20px;
            text-align: center
        }

        .sidebar-bottom {
            margin-top: auto;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border)
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: .75rem
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--green), var(--gold));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            color: #000;
            flex-shrink: 0
        }

        .user-name {
            font-size: .82rem;
            font-weight: 600;
            color: var(--text)
        }

        .user-role {
            font-family: 'IBM Plex Mono', monospace;
            font-size: .62rem;
            color: var(--muted)
        }

        .logout-btn {
            margin-top: .75rem;
            width: 100%;
            padding: .5rem;
            background: rgba(255, 61, 87, .08);
            border: 1px solid rgba(255, 61, 87, .2);
            border-radius: 8px;
            color: var(--red);
            font-family: 'Syne', sans-serif;
            font-size: .78rem;
            cursor: pointer;
            transition: all .2s
        }

        .logout-btn:hover {
            background: rgba(255, 61, 87, .15)
        }

        .main {
            margin-left: var(--sidebar-w);
            height: 100vh;
            overflow-y: auto;
            position: relative;
            z-index: 1
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .9rem 2rem;
            background: rgba(6, 8, 13, .9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border)
        }

        .topbar h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px
        }

        .clock {
            font-family: 'IBM Plex Mono', monospace;
            font-size: .72rem;
            color: var(--muted)
        }

        .page {
            padding: 1.5rem 2rem 3rem
        }

        .section-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            padding-bottom: .6rem;
            border-bottom: 1px solid var(--border)
        }

        .section-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px
        }

        /* MY PROFILE EDIT */
        .profile-edit {
            background: var(--card);
            border: 1px solid rgba(68, 138, 255, .2);
            border-radius: 14px;
            padding: 1.5rem;
            margin-bottom: 2rem
        }

        .profile-edit h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            color: var(--blue)
        }

        .pe-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: .8rem;
            margin-bottom: .8rem
        }

        .pe-grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .8rem;
            margin-bottom: .8rem
        }

        .fld label {
            display: block;
            font-size: .7rem;
            color: var(--muted);
            letter-spacing: .5px;
            text-transform: uppercase;
            margin-bottom: .35rem;
            font-family: 'IBM Plex Mono', monospace
        }

        .fld input,
        .fld select,
        .fld textarea {
            width: 100%;
            padding: .65rem .85rem;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: .85rem;
            outline: none;
            transition: border-color .2s;
            -webkit-appearance: none
        }

        .fld input:focus,
        .fld select:focus,
        .fld textarea:focus {
            border-color: var(--blue)
        }

        .fld textarea {
            resize: vertical;
            min-height: 70px
        }

        .fld select option {
            background: #0f1320
        }

        .save-btn {
            padding: .65rem 2rem;
            background: linear-gradient(135deg, #1565c0, var(--blue));
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: .88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(68, 138, 255, .3)
        }

        /* DIRECTORY GRID */
        .dir-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem
        }

        .dir-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.3rem;
            transition: all .2s;
            cursor: default
        }

        .dir-card:hover {
            border-color: rgba(255, 215, 64, .2);
            transform: translateY(-2px)
        }

        .dir-card.is-me {
            border-color: rgba(0, 230, 118, .3)
        }

        .dc-top {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem
        }

        .dc-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--green), var(--gold));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            color: #000;
            flex-shrink: 0
        }

        .dc-name {
            font-size: .95rem;
            font-weight: 600;
            color: var(--white)
        }

        .dc-business {
            font-size: .75rem;
            color: var(--muted);
            margin-top: .15rem
        }

        .dc-role {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            padding: .2rem .5rem;
            border-radius: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: .62rem;
            margin-top: .3rem
        }

        .role-seller {
            background: rgba(0, 230, 118, .1);
            border: 1px solid rgba(0, 230, 118, .2);
            color: var(--green)
        }

        .role-company {
            background: rgba(68, 138, 255, .1);
            border: 1px solid rgba(68, 138, 255, .2);
            color: var(--blue)
        }

        .role-dealer {
            background: rgba(255, 215, 64, .1);
            border: 1px solid rgba(255, 215, 64, .2);
            color: var(--gold)
        }

        .role-transporter {
            background: rgba(255, 61, 87, .1);
            border: 1px solid rgba(255, 61, 87, .2);
            color: var(--red)
        }

        .dc-info {
            font-size: .78rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: .8rem
        }

        .dc-info span {
            color: var(--text)
        }

        .dc-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: .8rem;
            border-top: 1px solid var(--border)
        }

        .dc-joined {
            font-family: 'IBM Plex Mono', monospace;
            font-size: .62rem;
            color: var(--muted)
        }

        .connect-btn {
            padding: .35rem .8rem;
            background: rgba(255, 215, 64, .1);
            border: 1px solid rgba(255, 215, 64, .2);
            border-radius: 8px;
            color: var(--gold);
            font-size: .72rem;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            transition: all .2s
        }

        .connect-btn:hover {
            background: rgba(255, 215, 64, .2)
        }

        .you-badge {
            padding: .35rem .8rem;
            background: rgba(0, 230, 118, .1);
            border: 1px solid rgba(0, 230, 118, .2);
            border-radius: 8px;
            color: var(--green);
            font-size: .72rem;
            font-family: 'IBM Plex Mono', monospace
        }

        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 3rem;
            color: var(--muted);
            font-size: .88rem
        }

        .filter-row {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap
        }

        .tab {
            padding: .4rem .9rem;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: .75rem;
            color: var(--muted);
            cursor: pointer;
            transition: all .2s;
            font-family: 'Syne', sans-serif
        }

        .tab.active,
        .tab:hover {
            background: rgba(0, 230, 118, .1);
            border-color: rgba(0, 230, 118, .3);
            color: var(--green)
        }

        .success-toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--blue);
            color: white;
            padding: .8rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: .88rem;
            z-index: 999;
            display: none
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="brand">Scrap<span>Connect</span></div>
            <div class="role-tag" id="sidebarRole">Loading...</div>
        </div>
        <span class="nav-section">Main</span>
        <a class="nav-item" href="/dashboard"><span class="icon">📊</span>Dashboard</a>
        <a class="nav-item" href="/overview"><span class="icon">🏪</span>Market</a>
        <a class="nav-item active" href="/scrap-connect"><span class="icon">🔗</span>ScrapConnect</a>
        <span class="nav-section">Account</span>
        <a class="nav-item" href="#"><span class="icon">👤</span>My Profile</a>
        <a class="nav-item" href="#"><span class="icon">📦</span>My Listings</a>
        <a class="nav-item" href="#"><span class="icon">💬</span>Messages</a>
        <div class="sidebar-bottom">
            <div class="user-pill">
                <div class="user-avatar" id="sidebarAvatar">?</div>
                <div>
                    <div class="user-name" id="sidebarName">Loading...</div>
                    <div class="user-role" id="sidebarRoleSub">—</div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h1>ScrapConnect Directory</h1>
            </div>
            <div class="clock" id="clock">00:00:00 IST</div>
        </div>

        <div class="page">

            <!-- EDIT MY PROFILE -->
            <div class="profile-edit">
                <h3>✏️ My Business Profile</h3>
                <div class="pe-grid">
                    <div class="fld"><label>First Name</label><input type="text" id="peFirst" /></div>
                    <div class="fld"><label>Last Name</label><input type="text" id="peLast" /></div>
                    <div class="fld"><label>Business Name</label><input type="text" id="peBusiness" /></div>
                </div>
                <div class="pe-grid">
                    <div class="fld"><label>Mobile</label><input type="text" id="pePhone" /></div>
                    <div class="fld"><label>Email</label><input type="email" id="peEmail" /></div>
                    <div class="fld"><label>City / Location</label><input type="text" id="peCity" /></div>
                </div>
                <div class="pe-grid2">
                    <div class="fld">
                        <label>Role</label>
                        <select id="peRole">
                            <option>Scrap Seller</option>
                            <option>Company</option>
                            <option>Dealer</option>
                            <option>Transporter</option>
                        </select>
                    </div>
                    <div class="fld"><label>GST / Business ID (optional)</label><input type="text" id="peGst"
                            placeholder="27AAAAA0000A1Z5" /></div>
                </div>
                <div class="fld" style="margin-bottom:.8rem">
                    <label>About / Business Description</label>
                    <textarea id="peAbout"
                        placeholder="Describe your business, what you buy/sell, specialties..."></textarea>
                </div>
                <button class="save-btn" onclick="saveProfile()">💾 Save Profile</button>
            </div>

            <!-- DIRECTORY -->
            <div class="section-header">
                <div>
                    <h2>All Members</h2>
                    <div style="font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--muted);margin-top:.3rem"
                        id="memberCount">0 members</div>
                </div>
                <div class="filter-row">
                    <button class="tab active" onclick="filterDir('all',this)">All</button>
                    <button class="tab" onclick="filterDir('Scrap Seller',this)">Sellers</button>
                    <button class="tab" onclick="filterDir('Company',this)">Companies</button>
                    <button class="tab" onclick="filterDir('Dealer',this)">Dealers</button>
                    <button class="tab" onclick="filterDir('Transporter',this)">Transporters</button>
                </div>
            </div>
            <div class="dir-grid" id="dirGrid">
                <div class="empty-state">No members yet. Register to appear here!</div>
            </div>
        </div>
    </main>

    <div class="success-toast" id="toast">✅ Profile updated!</div>

    <script>
        // ─── AUTH ─────────────────────────────────────────────
        const session = JSON.parse(localStorage.getItem('sc_session') || 'null');
        let users = JSON.parse(localStorage.getItem('sc_users') || '[]');
        let currentUser = null;

        if (!session || !session.userId) { window.location.href = '/'; }
        else {
            currentUser = users.find(u => u.id === session.userId);
            if (!currentUser) window.location.href = '/';
            else loadUserUI();
        }

        function loadUserUI() {
            const u = currentUser;
            document.getElementById('sidebarAvatar').textContent = u.avatar || u.firstName[0];
            document.getElementById('sidebarName').textContent = u.firstName + ' ' + u.lastName;
            document.getElementById('sidebarRoleSub').textContent = u.role;
            document.getElementById('sidebarRole').textContent = u.role.toUpperCase();
            // Fill profile form
            document.getElementById('peFirst').value = u.firstName || '';
            document.getElementById('peLast').value = u.lastName || '';
            document.getElementById('peBusiness').value = u.business || '';
            document.getElementById('pePhone').value = u.phone || '';
            document.getElementById('peEmail').value = u.email || '';
            document.getElementById('peCity').value = u.city || '';
            document.getElementById('peRole').value = u.role || 'Scrap Seller';
            document.getElementById('peGst').value = u.gst || '';
            document.getElementById('peAbout').value = u.about || '';
            renderDirectory();
        }

        function logout() { localStorage.removeItem('sc_session'); window.location.href = '/'; }

        // ─── CLOCK ────────────────────────────────────────────
        function updateClock() {
            document.getElementById('clock').textContent =
                new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Asia/Kolkata' }) + ' IST';
        }
        setInterval(updateClock, 1000); updateClock();

        // ─── SAVE PROFILE ─────────────────────────────────────
        function saveProfile() {
            const first = document.getElementById('peFirst').value.trim();
            const last = document.getElementById('peLast').value.trim();
            const business = document.getElementById('peBusiness').value.trim();
            const phone = document.getElementById('pePhone').value.trim();
            const email = document.getElementById('peEmail').value.trim();
            const city = document.getElementById('peCity').value.trim();
            const role = document.getElementById('peRole').value;
            const gst = document.getElementById('peGst').value.trim();
            const about = document.getElementById('peAbout').value.trim();

            if (!first || !last) return alert('Please enter your name.');

            // Update in array
            users = users.map(u => {
                if (u.id === currentUser.id) {
                    return {
                        ...u, firstName: first, lastName: last, fullName: first + ' ' + last,
                        business, phone, email, city, role, gst, about,
                        avatar: (first[0] + (last[0] || '')).toUpperCase()
                    };
                }
                return u;
            });
            localStorage.setItem('sc_users', JSON.stringify(users));
            currentUser = users.find(u => u.id === currentUser.id);

            // Update session role
            const sess = JSON.parse(localStorage.getItem('sc_session'));
            sess.role = role;
            localStorage.setItem('sc_session', JSON.stringify(sess));

            loadUserUI();
            const t = document.getElementById('toast'); t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
            renderDirectory();
        }

        // ─── DIRECTORY ────────────────────────────────────────
        let dirFilter = 'all';

        function filterDir(f, btn) {
            dirFilter = f;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderDirectory();
        }

        const roleClass = {
            'Scrap Seller': 'role-seller', 'Company': 'role-company',
            'Dealer': 'role-dealer', 'Transporter': 'role-transporter'
        };

        function renderDirectory() {
            users = JSON.parse(localStorage.getItem('sc_users') || '[]');
            const filtered = dirFilter === 'all' ? users : users.filter(u => u.role === dirFilter);
            document.getElementById('memberCount').textContent = filtered.length + ' member' + (filtered.length !== 1 ? 's' : '');
            const grid = document.getElementById('dirGrid');

            if (!filtered.length) {
                grid.innerHTML = '<div class="empty-state">No ' + dirFilter + ' members yet.</div>';
                return;
            }

            grid.innerHTML = filtered.map(u => {
                const isMe = u.id === currentUser.id;
                const rc = roleClass[u.role] || 'role-seller';
                return `
      <div class="dir-card${isMe ? ' is-me' : ''}">
        <div class="dc-top">
          <div class="dc-avatar">${u.avatar || u.firstName[0]}</div>
          <div>
            <div class="dc-name">${u.fullName}${isMe ? ' <span style="color:var(--green);font-size:.65rem">(You)</span>' : ''}</div>
            <div class="dc-business">${u.business || '—'}</div>
            <div class="dc-role ${rc}">${u.role}</div>
          </div>
        </div>
        <div class="dc-info">
          📍 <span>${u.city || 'Location not set'}</span><br>
          ${u.phone ? '📞 <span>' + u.phone + '</span><br>' : ''}
          ${u.email ? '✉️ <span>' + u.email + '</span><br>' : ''}
          ${u.gst ? '🏢 <span>GST: ' + u.gst + '</span><br>' : ''}
          ${u.about ? '<div style="margin-top:.4rem;font-style:italic">' + u.about.slice(0, 100) + (u.about.length > 100 ? '...' : '') + '</div>' : ''}
        </div>
        <div class="dc-footer">
          <div class="dc-joined">Joined ${new Date(u.joinedAt).toLocaleDateString('en-IN', { month: 'short', year: 'numeric' })}</div>
          ${isMe
                        ? '<span class="you-badge">Your Profile</span>'
                        : `<button class="connect-btn" onclick="alert('Contact ${u.fullName}\\n${u.phone ? '📞 ' + u.phone : ''}\\n${u.email ? '✉️ ' + u.email : ''}\\n📍 '+u.city)">Connect →</button>`
                    }
        </div>
      </div>
    `;
            }).join('');
        }
    </script>
</body>

</html>
