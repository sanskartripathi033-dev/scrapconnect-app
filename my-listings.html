<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScrapConnect — My Listings</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
        :root {
            --bg: #06080d; --bg2: #0c0f18; --card: #0f1320; --border: rgba(255, 255, 255, .07);
            --green: #00e676; --red: #ff3d57; --gold: #ffd740; --blue: #448aff;
            --text: #e8ecf5; --muted: #5a6275; --white: #fff; --sidebar-w: 240px
        }
        html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, .025) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0
        }

        .sidebar {
            position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
            background: var(--bg2); border-right: 1px solid var(--border); z-index: 100;
            display: flex; flex-direction: column; padding: 1.5rem 0
        }
        .sidebar-logo { padding: 0 1.5rem 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem }
        .sidebar-logo .brand { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 3px; color: var(--gold); text-decoration: none }
        .sidebar-logo .brand span { color: var(--green) }
        .sidebar-logo .role-tag { font-family: 'IBM Plex Mono', monospace; font-size: .62rem; color: var(--muted); letter-spacing: 1px; margin-top: .2rem }
        .nav-section { padding: .4rem 1rem; font-family: 'IBM Plex Mono', monospace; font-size: .6rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: .5rem }
        .nav-item { display: flex; align-items: center; gap: .75rem; padding: .7rem 1.5rem; font-size: .85rem; color: var(--muted); cursor: pointer; transition: all .2s; border-left: 3px solid transparent; text-decoration: none }
        .nav-item:hover { color: var(--text); background: rgba(255, 255, 255, .03) }
        .nav-item.active { color: var(--green); background: rgba(0, 230, 118, .06); border-left-color: var(--green) }
        .nav-item .icon { font-size: 1rem; width: 20px; text-align: center }
        .sidebar-bottom { margin-top: auto; padding: 1rem 1.5rem; border-top: 1px solid var(--border) }
        .user-pill { display: flex; align-items: center; gap: .75rem }
        .user-avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--green), var(--gold)); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: #000; flex-shrink: 0 }
        .user-name { font-size: .82rem; font-weight: 600; color: var(--text) }
        .user-role { font-family: 'IBM Plex Mono', monospace; font-size: .62rem; color: var(--muted) }
        .logout-btn { margin-top: .75rem; width: 100%; padding: .5rem; background: rgba(255, 61, 87, .08); border: 1px solid rgba(255, 61, 87, .2); border-radius: 8px; color: var(--red); font-family: 'Syne', sans-serif; font-size: .78rem; cursor: pointer; transition: all .2s }
        .logout-btn:hover { background: rgba(255, 61, 87, .15) }

        .main { margin-left: var(--sidebar-w); height: 100vh; overflow-y: auto; position: relative; z-index: 1 }
        .topbar { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: .9rem 2rem; background: rgba(6, 8, 13, .9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border) }
        .topbar h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px }
        .clock { font-family: 'IBM Plex Mono', monospace; font-size: .72rem; color: var(--muted) }

        .page { padding: 2rem; display: flex; flex-direction: column; gap: 2rem }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; display: flex; flex-direction: column; gap: .5rem }
        .stat-lbl { font-family: 'IBM Plex Mono', monospace; font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px }
        .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--white); line-height: 1 }
        .stat-val span { font-size: 1.2rem; color: var(--green); margin-left: .5rem }

        .list-container { display: flex; flex-direction: column; gap: 1rem }
        .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem }
        .list-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px }
        
        .item-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.2rem; display: grid; grid-template-columns: 60px 1fr 150px 120px; align-items: center; gap: 1.5rem; transition: all .2s }
        .item-card:hover { border-color: rgba(255, 255, 255, .15); background: rgba(255, 255, 255, .02) }
        .item-icon { width: 50px; height: 50px; background: rgba(255, 255, 255, .05); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem }
        .item-info h3 { font-size: 1rem; font-weight: 700; margin-bottom: .2rem; color: var(--white) }
        .item-info p { font-size: .75rem; color: var(--muted) }
        .item-price { text-align: right }
        .ip-val { font-family: 'IBM Plex Mono', monospace; font-weight: 700; color: var(--gold) }
        .ip-unit { font-size: .7rem; color: var(--muted) }
        .item-actions { display: flex; gap: .5rem; justify-content: flex-end }
        .btn-del { padding: .5rem; background: rgba(255, 61, 87, .1); border: 1px solid rgba(255, 61, 87, .2); border-radius: 8px; color: var(--red); cursor: pointer; transition: all .2s; font-size: .75rem }
        .btn-del:hover { background: var(--red); color: #fff }
        
        .empty-state { padding: 4rem; text-align: center; background: rgba(255, 255, 255, 0.02); border: 1px dashed var(--border); border-radius: 24px }
        .empty-state h3 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; margin-bottom: 1rem; color: var(--muted) }
        .empty-state a { display: inline-block; padding: .8rem 2rem; background: var(--green); color: #000; border-radius: 10px; text-decoration: none; font-weight: 800; font-size: .9rem }

        .tag { font-family: 'IBM Plex Mono', monospace; font-size: .6rem; padding: .2rem .5rem; border-radius: 4px; text-transform: uppercase; font-weight: 700 }
        .tag-sell { background: rgba(0, 230, 118, .1); color: var(--green) }
        .tag-buy { background: rgba(68, 138, 255, .1); color: var(--blue) }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <a href="about.html" class="brand">Scrap<span>Connect</span></a>
            <div class="role-tag" id="sidebarRole">Loading...</div>
        </div>
        <span class="nav-section">Main</span>
        <a class="nav-item" href="dashboard.html"><span class="icon">📊</span>Dashboard</a>
        <a class="nav-item" href="trends.html"><span class="icon">📈</span>Trends</a>
        <a class="nav-item" href="overview.html"><span class="icon">🏪</span>Market</a>
        <a class="nav-item" href="scanner.html"><span class="icon">📸</span>AI Scanner</a>
        <a class="nav-item" href="explore.html"><span class="icon">🖼️</span>Explore</a>
        <a class="nav-item" href="investment.html"><span class="icon">💰</span>Investment</a>
        <a class="nav-item" href="scrap-connect.html"><span class="icon">🔗</span>Directory</a>
        <span class="nav-section">Account</span>
        <a class="nav-item" href="profile.html"><span class="icon">👤</span>My Profile</a>
        <a class="nav-item active" href="my-listings.html"><span class="icon">📦</span>My Listings</a>
        <a class="nav-item" href="messages.html"><span class="icon">💬</span>Messages</a>
        <div class="sidebar-bottom">
            <div class="user-pill">
                <div class="user-avatar" id="sidebarAvatar">?</div>
                <div><div class="user-name" id="sidebarName">Loading...</div><div class="user-role" id="sidebarRoleSub">—</div></div>
            </div>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div><h1>My Inventory & Listings</h1></div>
            <div class="clock" id="clock">00:00:00 IST</div>
        </div>

        <div class="page">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-lbl">Active Listings</div>
                    <div class="stat-val" id="activeCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-lbl">Estimated Value</div>
                    <div class="stat-val" id="totalValue">₹0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-lbl">Inventory Mass</div>
                    <div class="stat-val" id="totalQty">0 <span>MT</span></div>
                </div>
            </div>

            <div class="list-container">
                <div class="list-header">
                    <h2>Your Current Posts</h2>
                    <a href="overview.html" style="color:var(--green); font-size:.8rem; text-decoration:none">Post New Listing +</a>
                </div>
                <div id="listingGrid" class="list-container">
                    <!-- Dynamic Content -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const session = JSON.parse(localStorage.getItem('sc_session') || 'null');
        const users = JSON.parse(localStorage.getItem('sc_users') || '[]');
        let currentUser = null;

        if (!session || !session.userId) { window.location.href = 'login-page.html'; }
        else {
            currentUser = users.find(u => u.id === session.userId);
            if (!currentUser) window.location.href = 'login-page.html';
            else loadPage();
        }

        function loadPage() {
            document.getElementById('sidebarAvatar').textContent = currentUser.avatar || currentUser.firstName[0];
            document.getElementById('sidebarName').textContent = currentUser.firstName + ' ' + currentUser.lastName;
            document.getElementById('sidebarRoleSub').textContent = currentUser.role;
            document.getElementById('sidebarRole').textContent = currentUser.role.toUpperCase();
            renderMyListings();
        }

        function renderMyListings() {
            const all = JSON.parse(localStorage.getItem('sc_listings') || '[]');
            const mine = all.filter(l => l.postedBy === currentUser.id);
            const grid = document.getElementById('listingGrid');
            
            // Update Stats
            document.getElementById('activeCount').textContent = mine.length;
            let val = 0; let qty = 0;
            mine.forEach(l => {
                val += (parseFloat(l.price) || 0) * (parseFloat(l.qty) || 1);
                qty += parseFloat(l.qty) || 0;
            });
            document.getElementById('totalValue').textContent = '₹' + val.toLocaleString('en-IN');
            document.getElementById('totalQty').innerHTML = qty.toFixed(1) + ' <span>MT</span>';

            if (!mine.length) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>No active listings found</h3>
                        <p style="color:var(--muted); margin-bottom:1.5rem">You haven't posted any buy or sell requirements yet.</p>
                        <a href="overview.html">Post Your First Listing</a>
                    </div>
                `;
                return;
            }

            const catIcon = { metal: '⚙️', plastic: '🧴', paper: '📰', ewaste: '💻', rubber: '🔧', construction: '🏗️' };
            grid.innerHTML = mine.map(l => `
                <div class="item-card">
                    <div class="item-icon">${catIcon[l.cat] || '📦'}</div>
                    <div class="item-info">
                        <h3>${l.name} <span class="tag ${l.type === 'buy' ? 'tag-buy' : 'tag-sell'}">${l.type}</span></h3>
                        <p>${l.grade || 'Standard Grade'} · ${l.qty} ${l.unit}</p>
                    </div>
                    <div class="item-price">
                        <div class="ip-val">₹${parseInt(l.price).toLocaleString('en-IN')}</div>
                        <div class="ip-unit">per ${l.unit}</div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-del" onclick="deleteListing('${l.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteListing(id) {
            if (!confirm('Are you sure you want to delete this listing?')) return;
            let all = JSON.parse(localStorage.getItem('sc_listings') || '[]');
            all = all.filter(l => l.id !== id);
            localStorage.setItem('sc_listings', JSON.stringify(all));
            renderMyListings();
        }

        function logout() { localStorage.removeItem('sc_session'); window.location.href = 'login-page.html'; }
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Asia/Kolkata' }) + ' IST';
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
