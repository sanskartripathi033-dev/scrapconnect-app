<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScrapConnect — My Profile</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
        :root {
            --bg: #06080d; --bg2: #0c0f18; --card: #0f1320; --border: rgba(255, 255, 255, .07);
            --green: #00e676; --red: #ff3d57; --gold: #ffd740; --blue: #448aff;
            --text: #e8ecf5; --muted: #5a6275; --white: #fff; --sidebar-w: 240px
        }
        html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, .025) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0
        }

        .sidebar {
            position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
            background: var(--bg2); border-right: 1px solid var(--border); z-index: 100;
            display: flex; flex-direction: column; padding: 1.5rem 0
        }
        .sidebar-logo { padding: 0 1.5rem 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem }
        .sidebar-logo .brand { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 3px; color: var(--gold); text-decoration: none }
        .sidebar-logo .brand span { color: var(--green) }
        .sidebar-logo .role-tag { font-family: 'IBM Plex Mono', monospace; font-size: .62rem; color: var(--muted); letter-spacing: 1px; margin-top: .2rem }
        .nav-section { padding: .4rem 1rem; font-family: 'IBM Plex Mono', monospace; font-size: .6rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: .5rem }
        .nav-item { display: flex; align-items: center; gap: .75rem; padding: .7rem 1.5rem; font-size: .85rem; color: var(--muted); cursor: pointer; transition: all .2s; border-left: 3px solid transparent; text-decoration: none }
        .nav-item:hover { color: var(--text); background: rgba(255, 255, 255, .03) }
        .nav-item.active { color: var(--gold); background: rgba(255, 215, 64, .06); border-left-color: var(--gold) }
        .nav-item .icon { font-size: 1rem; width: 20px; text-align: center }
        .sidebar-bottom { margin-top: auto; padding: 1rem 1.5rem; border-top: 1px solid var(--border) }
        .user-pill { display: flex; align-items: center; gap: .75rem }
        .user-avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--green), var(--gold)); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: #000; flex-shrink: 0 }
        .user-name { font-size: .82rem; font-weight: 600; color: var(--text) }
        .user-role { font-family: 'IBM Plex Mono', monospace; font-size: .62rem; color: var(--muted) }
        .logout-btn { margin-top: .75rem; width: 100%; padding: .5rem; background: rgba(255, 61, 87, .08); border: 1px solid rgba(255, 61, 87, .2); border-radius: 8px; color: var(--red); font-family: 'Syne', sans-serif; font-size: .78rem; cursor: pointer; transition: all .2s }
        .logout-btn:hover { background: rgba(255, 61, 87, .15) }

        .main { margin-left: var(--sidebar-w); height: 100vh; overflow-y: auto; position: relative; z-index: 1 }
        .topbar { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: .9rem 2rem; background: rgba(6, 8, 13, .9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border) }
        .topbar h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px }
        .clock { font-family: 'IBM Plex Mono', monospace; font-size: .72rem; color: var(--muted) }

        .page { padding: 2rem; max-width: 1000px; margin: 0 auto }
        
        /* PROFILE EDIT CARD */
        .profile-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; margin-bottom: 2rem; position: relative }
        .profile-header { display: flex; align-items: center; gap: 2rem; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border) }
        .large-avatar { width: 100px; height: 100px; border-radius: 25px; background: linear-gradient(135deg, var(--green), var(--gold)); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5) }
        
        .pe-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 1.5rem }
        .fld label { display: block; font-size: .7rem; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; margin-bottom: .5rem; font-family: 'IBM Plex Mono', monospace }
        .fld input, .fld select, .fld textarea { width: 100%; padding: 0.9rem 1.2rem; background: rgba(255, 255, 255, .05); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 0.95rem; outline: none; transition: border-color .2s }
        .fld input:focus, .fld select:focus, .fld textarea:focus { border-color: var(--gold) }
        .fld textarea { resize: vertical; min-height: 120px }

        .save-btn { padding: 1rem 3rem; background: var(--gold); border: none; border-radius: 12px; color: #000; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; transition: all .2s; margin-top: 1rem }
        .save-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 215, 64, 0.3) }
        
        .success-toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--green); color: #000; padding: 1rem 2rem; border-radius: 12px; font-weight: 700; z-index: 1000; display: none; animation: slideUp 0.3s ease }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <a href="about.html" class="brand">Scrap<span>Connect</span></a>
            <div class="role-tag" id="sidebarRole">Loading...</div>
        </div>
        <span class="nav-section">Main</span>
        <a class="nav-item" href="dashboard.html"><span class="icon">📊</span>Dashboard</a>
        <a class="nav-item" href="trends.html"><span class="icon">📈</span>Trends</a>
        <a class="nav-item" href="overview.html"><span class="icon">🏪</span>Market</a>
        <a class="nav-item" href="scanner.html"><span class="icon">📸</span>AI Scanner</a>
        <a class="nav-item" href="explore.html"><span class="icon">🖼️</span>Explore</a>
        <a class="nav-item" href="investment.html"><span class="icon">💰</span>Investment</a>
        <a class="nav-item" href="scrap-connect.html"><span class="icon">🔗</span>Directory</a>
        <span class="nav-section">Account</span>
        <a class="nav-item active" href="profile.html"><span class="icon">👤</span>My Profile</a>
        <a class="nav-item" href="my-listings.html"><span class="icon">📦</span>My Listings</a>
        <a class="nav-item" href="messages.html"><span class="icon">💬</span>Messages</a>
        <div class="sidebar-bottom">
            <div class="user-pill">
                <div class="user-avatar" id="sidebarAvatar">?</div>
                <div><div class="user-name" id="sidebarName">Loading...</div><div class="user-role" id="sidebarRoleSub">—</div></div>
            </div>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div><h1>My Business Profile</h1></div>
            <div class="clock" id="clock">00:00:00 IST</div>
        </div>

        <div class="page">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="large-avatar" id="largeAvatar">?</div>
                    <div>
                        <h2 id="headerName" style="font-size: 2rem; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px">User Name</h2>
                        <p id="headerRole" style="color: var(--gold); font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem">Business Role</p>
                    </div>
                </div>

                <div class="pe-grid">
                    <div class="fld"><label>First Name</label><input type="text" id="peFirst" /></div>
                    <div class="fld"><label>Last Name</label><input type="text" id="peLast" /></div>
                </div>
                <div class="fld" style="margin-bottom: 1.5rem"><label>Business Name</label><input type="text" id="peBusiness" /></div>
                
                <div class="pe-grid">
                    <div class="fld"><label>Mobile Number</label><input type="text" id="pePhone" /></div>
                    <div class="fld"><label>Email Address</label><input type="email" id="peEmail" /></div>
                </div>
                
                <div class="pe-grid">
                    <div class="fld"><label>City / Location</label><input type="text" id="peCity" /></div>
                    <div class="fld">
                        <label>Business Role</label>
                        <select id="peRole">
                            <option>Scrap Seller</option>
                            <option>Company</option>
                            <option>Dealer</option>
                            <option>Transporter</option>
                        </select>
                    </div>
                </div>

                <div class="fld" style="margin-bottom: 1.5rem"><label>GST / Tax ID (Optional)</label><input type="text" id="peGst" placeholder="27AAAAA0000A1Z5" /></div>
                
                <div class="fld" style="margin-bottom: 2rem">
                    <label>About Your Business</label>
                    <textarea id="peAbout" placeholder="Describe what you trade, your specialties, and your terms..."></textarea>
                </div>

                <button class="save-btn" onclick="saveProfile()">💾 Update Profile</button>
            </div>
        </div>
    </main>

    <div class="success-toast" id="toast">✅ Profile updated successfully!</div>

    <script>
        let session = JSON.parse(localStorage.getItem('sc_session') || 'null');
        let users = JSON.parse(localStorage.getItem('sc_users') || '[]');
        let currentUser = null;

        if (!session || !session.userId) { window.location.href = 'login-page.html'; }
        else {
            currentUser = users.find(u => u.id === session.userId);
            if (!currentUser) window.location.href = 'login-page.html';
            else loadProfile();
        }

        function loadProfile() {
            const u = currentUser;
            document.getElementById('sidebarAvatar').textContent = u.avatar || u.firstName[0];
            document.getElementById('largeAvatar').textContent = u.avatar || u.firstName[0];
            document.getElementById('sidebarName').textContent = u.firstName + ' ' + u.lastName;
            document.getElementById('headerName').textContent = u.firstName + ' ' + u.lastName;
            document.getElementById('sidebarRoleSub').textContent = u.role;
            document.getElementById('headerRole').textContent = u.role.toUpperCase();
            document.getElementById('sidebarRole').textContent = u.role.toUpperCase();

            document.getElementById('peFirst').value = u.firstName || '';
            document.getElementById('peLast').value = u.lastName || '';
            document.getElementById('peBusiness').value = u.business || '';
            document.getElementById('pePhone').value = u.phone || '';
            document.getElementById('peEmail').value = u.email || '';
            document.getElementById('peCity').value = u.city || '';
            document.getElementById('peRole').value = u.role || 'Scrap Seller';
            document.getElementById('peGst').value = u.gst || '';
            document.getElementById('peAbout').value = u.about || '';
        }

        function saveProfile() {
            const first = document.getElementById('peFirst').value.trim();
            const last = document.getElementById('peLast').value.trim();
            const business = document.getElementById('peBusiness').value.trim();
            const role = document.getElementById('peRole').value;
            
            if (!first || !last) return alert('Name is required.');

            users = users.map(u => {
                if (u.id === currentUser.id) {
                    return {
                        ...u, firstName: first, lastName: last, fullName: first + ' ' + last,
                        business, role, phone: document.getElementById('pePhone').value,
                        email: document.getElementById('peEmail').value,
                        city: document.getElementById('peCity').value,
                        gst: document.getElementById('peGst').value,
                        about: document.getElementById('peAbout').value,
                        avatar: (first[0] + (last[0] || '')).toUpperCase()
                    };
                }
                return u;
            });
            localStorage.setItem('sc_users', JSON.stringify(users));
            currentUser = users.find(u => u.id === currentUser.id);
            
            // Update session role
            session.role = role;
            localStorage.setItem('sc_session', JSON.stringify(session));

            loadProfile();
            const t = document.getElementById('toast'); t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function logout() { localStorage.removeItem('sc_session'); window.location.href = 'login-page.html'; }
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Asia/Kolkata' }) + ' IST';
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
