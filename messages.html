<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScrapConnect — Messages</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
        :root {
            --bg: #06080d; --bg2: #0c0f18; --card: #0f1320; --border: rgba(255, 255, 255, .07);
            --green: #00e676; --red: #ff3d57; --gold: #ffd740; --blue: #448aff;
            --text: #e8ecf5; --muted: #5a6275; --white: #fff; --sidebar-w: 240px
        }
        html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, .025) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0
        }

        .sidebar {
            position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
            background: var(--bg2); border-right: 1px solid var(--border); z-index: 100;
            display: flex; flex-direction: column; padding: 1.5rem 0
        }
        .sidebar-logo { padding: 0 1.5rem 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem }
        .sidebar-logo .brand { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 3px; color: var(--gold); text-decoration: none }
        .sidebar-logo .brand span { color: var(--green) }
        .sidebar-logo .role-tag { font-family: 'IBM Plex Mono', monospace; font-size: .62rem; color: var(--muted); letter-spacing: 1px; margin-top: .2rem }
        .nav-section { padding: .4rem 1rem; font-family: 'IBM Plex Mono', monospace; font-size: .6rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: .5rem }
        .nav-item { display: flex; align-items: center; gap: .75rem; padding: .7rem 1.5rem; font-size: .85rem; color: var(--muted); cursor: pointer; transition: all .2s; border-left: 3px solid transparent; text-decoration: none }
        .nav-item:hover { color: var(--text); background: rgba(255, 255, 255, .03) }
        .nav-item.active { color: var(--blue); background: rgba(68, 138, 255, .06); border-left-color: var(--blue) }
        .nav-item .icon { font-size: 1rem; width: 20px; text-align: center }
        .sidebar-bottom { margin-top: auto; padding: 1rem 1.5rem; border-top: 1px solid var(--border) }
        .user-pill { display: flex; align-items: center; gap: .75rem }
        .user-avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--green), var(--gold)); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: #000; flex-shrink: 0 }
        .user-name { font-size: .82rem; font-weight: 600; color: var(--text) }
        .user-role { font-family: 'IBM Plex Mono', monospace; font-size: .62rem; color: var(--muted) }
        .logout-btn { margin-top: .75rem; width: 100%; padding: .5rem; background: rgba(255, 61, 87, .08); border: 1px solid rgba(255, 61, 87, .2); border-radius: 8px; color: var(--red); font-family: 'Syne', sans-serif; font-size: .78rem; cursor: pointer; transition: all .2s }
        .logout-btn:hover { background: rgba(255, 61, 87, .15) }

        .main { margin-left: var(--sidebar-w); height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 1 }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: .9rem 2rem; background: rgba(6, 8, 13, .9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border) }
        .topbar h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px }

        .chat-layout { flex: 1; display: grid; grid-template-columns: 320px 1fr; overflow: hidden }
        
        /* CHAT LIST */
        .chat-sidebar { background: rgba(12, 15, 24, .5); border-right: 1px solid var(--border); display: flex; flex-direction: column }
        .cs-search { padding: 1rem; border-bottom: 1px solid var(--border) }
        .cs-search input { width: 100%; padding: .6rem 1rem; background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 8px; color: #fff; font-size: .85rem }
        .cs-list { overflow-y: auto; flex: 1 }
        .chat-item { display: flex; align-items: center; gap: 1rem; padding: 1.2rem; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.03); transition: all .2s }
        .chat-item:hover { background: rgba(255,255,255,.03) }
        .chat-item.active { background: rgba(68, 138, 255, .08); border-left: 3px solid var(--blue) }
        .ci-avatar { width: 44px; height: 44px; border-radius: 12px; background: var(--bg2); border: 1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue'; font-size:1.2rem; flex-shrink:0 }
        .ci-info { min-width: 0; flex: 1 }
        .ci-name { font-weight: 700; font-size: .9rem; margin-bottom: .2rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
        .ci-msg { font-size: .75rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
        .ci-time { font-family: 'IBM Plex Mono'; font-size: .6rem; color: var(--muted); margin-left: auto }

        /* CHAT WINDOW */
        .chat-window { display: flex; flex-direction: column; background: rgba(6, 8, 13, .3) }
        .cw-header { padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1rem; background: rgba(12, 15, 24, .5) }
        .cw-body { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1rem }
        .cw-footer { padding: 1.5rem 2rem; border-top: 1px solid var(--border); background: rgba(12, 15, 24, .8) }
        
        .msg { max-width: 65%; padding: .9rem 1.2rem; border-radius: 18px; font-size: .9rem; line-height: 1.5; position: relative }
        .msg-in { background: var(--card); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px }
        .msg-out { background: var(--blue); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px }
        .msg-time { font-family: 'IBM Plex Mono'; font-size: .55rem; color: var(--muted); margin-top: .4rem; display: block; text-align: right }
        .msg-out .msg-time { color: rgba(255,255,255,.7) }

        .chat-input-wrap { display: flex; gap: 1rem; align-items: center }
        .chat-input { flex: 1; padding: .9rem 1.5rem; background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 14px; color: #fff; outline: none; transition: border-color .2s }
        .chat-input:focus { border-color: var(--blue) }
        .send-btn { width: 48px; height: 48px; border-radius: 14px; background: var(--blue); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .2s }
        .send-btn:hover { transform: scale(1.05) }

        .empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted) }
        .empty-chat h2 { font-family: 'Bebas Neue'; font-size: 2.5rem; letter-spacing: 2px; margin-bottom: .5rem }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 5px }
        ::-webkit-scrollbar-track { background: transparent }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted) }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <a href="about.html" class="brand">Scrap<span>Connect</span></a>
            <div class="role-tag" id="sidebarRole">Loading...</div>
        </div>
        <span class="nav-section">Main</span>
        <a class="nav-item" href="dashboard.html"><span class="icon">📊</span>Dashboard</a>
        <a class="nav-item" href="trends.html"><span class="icon">📈</span>Trends</a>
        <a class="nav-item" href="overview.html"><span class="icon">🏪</span>Market</a>
        <a class="nav-item" href="scanner.html"><span class="icon">📸</span>AI Scanner</a>
        <a class="nav-item" href="explore.html"><span class="icon">🖼️</span>Explore</a>
        <a class="nav-item" href="investment.html"><span class="icon">💰</span>Investment</a>
        <a class="nav-item" href="scrap-connect.html"><span class="icon">🔗</span>Directory</a>
        <span class="nav-section">Account</span>
        <a class="nav-item" href="profile.html"><span class="icon">👤</span>My Profile</a>
        <a class="nav-item" href="my-listings.html"><span class="icon">📦</span>My Listings</a>
        <a class="nav-item active" href="messages.html"><span class="icon">💬</span>Messages</a>
        <div class="sidebar-bottom">
            <div class="user-pill">
                <div class="user-avatar" id="sidebarAvatar">?</div>
                <div><div class="user-name" id="sidebarName">Loading...</div><div class="user-role" id="sidebarRoleSub">—</div></div>
            </div>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div><h1>Secure Business Messaging</h1></div>
            <div style="font-family:'IBM Plex Mono'; font-size:.7rem; color:var(--green)">● Encrypted Channel</div>
        </div>

        <div class="chat-layout">
            <div class="chat-sidebar">
                <div class="cs-search">
                    <input type="text" placeholder="Search conversations..." oninput="filterChats(this.value)" />
                </div>
                <div class="cs-list" id="chatList">
                    <!-- Conversations will load here -->
                </div>
            </div>

            <div class="chat-window" id="chatWindow">
                <!-- Chat dynamic content -->
                <div class="empty-chat">
                    <h2>Select a contact</h2>
                    <p>Start a new business conversation now</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const session = JSON.parse(localStorage.getItem('sc_session') || 'null');
        const users = JSON.parse(localStorage.getItem('sc_users') || '[]');
        let currentUser = null;
        let activeChatUserId = null;

        if (!session || !session.userId) { window.location.href = 'login-page.html'; }
        else {
            currentUser = users.find(u => u.id === session.userId);
            if (!currentUser) window.location.href = 'login-page.html';
            else initMessages();
        }

        function initMessages() {
            document.getElementById('sidebarAvatar').textContent = currentUser.avatar || currentUser.firstName[0];
            document.getElementById('sidebarName').textContent = currentUser.firstName + ' ' + currentUser.lastName;
            document.getElementById('sidebarRoleSub').textContent = currentUser.role;
            document.getElementById('sidebarRole').textContent = currentUser.role.toUpperCase();

            // Check URL for targetUser
            const params = new URLSearchParams(window.location.search);
            const target = params.get('user');
            if (target && target !== currentUser.id) {
                activeChatUserId = target;
            }

            renderChatList();
            if (activeChatUserId) openChat(activeChatUserId);
        }

        function getMessages() { return JSON.parse(localStorage.getItem('sc_messages') || '[]'); }
        function saveMessages(msgs) { localStorage.setItem('sc_messages', JSON.stringify(msgs)); }

        function renderChatList() {
            const msgs = getMessages();
            const chatList = document.getElementById('chatList');
            
            // Group by contact
            const contactsMap = {};
            msgs.forEach(m => {
                const otherId = (m.from === currentUser.id) ? m.to : m.from;
                if (!contactsMap[otherId] || new Date(m.timestamp) > new Date(contactsMap[otherId].timestamp)) {
                    contactsMap[otherId] = m;
                }
            });

            // Ensure our active target is in the list even if no messages yet
            if (activeChatUserId && !contactsMap[activeChatUserId]) {
                contactsMap[activeChatUserId] = { from: activeChatUserId, to: currentUser.id, text: "Start a conversation", timestamp: new Date().toISOString() };
            }

            const sortedContacts = Object.keys(contactsMap).sort((a,b) => new Date(contactsMap[b].timestamp) - new Date(contactsMap[a].timestamp));

            if (sortedContacts.length === 0) {
                chatList.innerHTML = '<div style="padding:2rem; text-align:center; color:var(--muted); font-size:.8rem">No conversations yet. Connect with dealers in the directory!</div>';
                return;
            }

            chatList.innerHTML = sortedContacts.map(uid => {
                const u = users.find(usr => usr.id === uid) || { fullName: 'Deleted User', avatar: '?' };
                const lastMsg = contactsMap[uid];
                const activeClass = (uid === activeChatUserId) ? 'active' : '';
                const time = new Date(lastMsg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                return `
                    <div class="chat-item ${activeClass}" onclick="openChat('${uid}')">
                        <div class="ci-avatar">${u.avatar || u.firstName[0]}</div>
                        <div class="ci-info">
                            <div class="ci-name">${u.fullName}</div>
                            <div class="ci-msg">${lastMsg.text}</div>
                        </div>
                        <div class="ci-time">${time}</div>
                    </div>
                `;
            }).join('');
        }

        function openChat(uid) {
            activeChatUserId = uid;
            const u = users.find(usr => usr.id === uid) || { fullName: 'Unknown', role: 'Member' };
            const chatWindow = document.getElementById('chatWindow');
            
            chatWindow.innerHTML = `
                <div class="cw-header">
                    <div class="ci-avatar">${u.avatar || u.firstName[0]}</div>
                    <div>
                        <div style="font-weight:800; font-size:1.1rem">${u.fullName}</div>
                        <div style="font-size:.7rem; color:var(--muted); text-transform:uppercase">${u.role}</div>
                    </div>
                </div>
                <div class="cw-body" id="chatBody"></div>
                <div class="cw-footer">
                    <div class="chat-input-wrap">
                        <input type="text" class="chat-input" id="chatInput" placeholder="Type a business proposal..." onkeypress="handleKey(event)" />
                        <button class="send-btn" onclick="sendMessage()">➤</button>
                    </div>
                </div>
            `;
            
            renderMessages();
            document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
            // Refresh list to update active class
            renderChatList();
        }

        function renderMessages() {
            const msgs = getMessages().filter(m => (m.from === currentUser.id && m.to === activeChatUserId) || (m.from === activeChatUserId && m.to === currentUser.id));
            const body = document.getElementById('chatBody');
            
            if (!msgs.length) {
                body.innerHTML = '<div style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:.85rem">No messages yet. Say hello!</div>';
            } else {
                body.innerHTML = msgs.map(m => {
                    const isOut = (m.from === currentUser.id);
                    const time = new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    return `
                        <div class="msg ${isOut ? 'msg-out' : 'msg-in'}">
                            ${m.text}
                            <span class="msg-time">${time}</span>
                        </div>
                    `;
                }).join('');
            }
            body.scrollTop = body.scrollHeight;
        }

        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !activeChatUserId) return;

            const msg = {
                id: 'msg_' + Date.now(),
                from: currentUser.id,
                to: activeChatUserId,
                text: text,
                timestamp: new Date().toISOString()
            };

            const msgs = getMessages();
            msgs.push(msg);
            saveMessages(msgs);
            
            input.value = '';
            renderMessages();
            renderChatList();
        }

        function logout() { localStorage.removeItem('sc_session'); window.location.href = 'login-page.html'; }
    </script>
</body>
</html>
